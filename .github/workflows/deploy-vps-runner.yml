name: Deploy Backend VPS (Self-Hosted Runner)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, tradingapi]
    timeout-minutes: 30
    environment: production
    steps:
      - name: Resolve target ref
        id: ref
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TARGET_REF="$GITHUB_REF_NAME"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${INPUT_REF:-}" ]; then
            TARGET_REF="$INPUT_REF"
          fi
          echo "target_ref=$TARGET_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.target_ref }}

      - name: Deploy stack on VPS (local runner)
        working-directory: websocket
        run: |
          set -euo pipefail
          sh scripts/deploy_stack.sh
