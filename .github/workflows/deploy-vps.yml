name: Deploy Backend VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Prepare SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [ -n "${VPS_SSH_PRIVATE_KEY:-}" ]; then
            printf '%s' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
          fi
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          INPUT_REF: ${{ github.event.inputs.ref }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ ! -f ~/.ssh/id_ed25519 ]; then
            echo "VPS_SSH_PRIVATE_KEY must be configured."
            exit 1
          fi
          TARGET_REF="$GITHUB_REF_NAME"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "${INPUT_REF:-}" ]; then
            TARGET_REF="$INPUT_REF"
          fi

          ssh -o StrictHostKeyChecking=yes -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "TARGET_REF='$TARGET_REF' DEPLOY_REPO_TOKEN='$DEPLOY_REPO_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail

          REPO_SLUG="TradeWithOsmo/osmo-backend"
          APP_DIR="/root/backend"
          AUTH_HEADER="Authorization: Basic $(printf 'x-access-token:%s' "$DEPLOY_REPO_TOKEN" | base64 -w0)"

          if [ ! -d "$APP_DIR/.git" ]; then
            git -c "http.extraHeader=${AUTH_HEADER}" clone "https://github.com/${REPO_SLUG}.git" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git remote set-url origin "https://github.com/${REPO_SLUG}.git"

          git -c "http.extraHeader=${AUTH_HEADER}" fetch --prune origin "$TARGET_REF"
          git checkout -B "$TARGET_REF" "FETCH_HEAD"

          cd websocket
          if [ ! -f .env ]; then
            touch .env
          fi
          sh scripts/deploy_stack.sh
          REMOTE
