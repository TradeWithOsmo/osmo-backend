#      - QDRANT_HOST=osmo-qdrant
#      - QDRANT_PORT=6333
#      - OPENAI_API_KEY=${OPENAI_API_KEY}
#      - MEM0_DATA_DIR=/data
#    restart: unless-stopped
#    depends_on:
#      - qdrant
#    volumes:
#      - ../docker-data/mem0:/data
#    networks:
#      - osmo-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: osmo-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ../docker-data/qdrant:/qdrant/storage
    restart: unless-stopped
    networks:
      - osmo-network

volumes:
  postgres_data:

networks:
  osmo-network:
    name: osmo-network
    driver: bridge
