version: '3.8'

services:
  backend:
    build: .
    container_name: osmo-backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - ../connectors:/app/connectors
      - ../analysis:/app/analysis
      - ../agent:/app/agent
      - ../contracts:/app/contracts
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SAVE_TO_DB=${SAVE_TO_DB:-False}
      - DATABASE_URL=postgresql://osmo_user:osmo_password@db:5432/osmo_db
      - REDIS_URL=redis://osmo-redis:6379/0
      - QDRANT_HOST=${QDRANT_HOST:-osmo-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_KB_COLLECTION=${QDRANT_KB_COLLECTION:-osmo_knowledge_base_384}
      - KB_EMBEDDING_PROVIDER=${KB_EMBEDDING_PROVIDER:-local}
      - KB_EMBEDDING_MODEL=${KB_EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - KB_EMBEDDING_DIMS=${KB_EMBEDDING_DIMS:-384}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - osmo-network

  redis:
    image: redis:7-alpine
    container_name: osmo-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - osmo-network

  db:
    image: postgres:15-alpine
    container_name: osmo-db
    environment:
      POSTGRES_USER: osmo_user
      POSTGRES_PASSWORD: osmo_password
      POSTGRES_DB: osmo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "osmo_db", "-U", "osmo_user" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - osmo-network

  mem0:
    build:
      context: ../mem0/server
      dockerfile: Dockerfile
    container_name: osmo-mem0
    ports:
      - "8888:8000"
    env_file:
      - ../mem0/server/.env
    environment:
      - VECTOR_STORE_PROVIDER=qdrant
      - QDRANT_HOST=osmo-qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    depends_on:
      - qdrant
    networks:
      - osmo-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: osmo-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - osmo-network

  inngest:
    image: inngest/inngest:latest
    container_name: osmo-inngest
    ports:
      - "8288:8288"
    environment:
      - INNGEST_EVENT_KEY=local
      - INNGEST_SIGNING_KEY=local
    # Start dev server pointing to our worker service automatically
    command: inngest dev -u http://osmo-inngest-worker:8000/api/inngest
    restart: unless-stopped
    networks:
      - osmo-network

  inngest-worker:
    build:
      context: ../inngest-py
      dockerfile: Dockerfile
    container_name: osmo-inngest-worker
    ports:
      - "8008:8000"
    environment:
      - QDRANT_HOST=osmo-qdrant
      - QDRANT_PORT=6333
      - QDRANT_KB_COLLECTION=${QDRANT_KB_COLLECTION:-osmo_knowledge_base}
      - KB_EMBEDDING_PROVIDER=${KB_EMBEDDING_PROVIDER:-local}
      - KB_EMBEDDING_DIMS=${KB_EMBEDDING_DIMS:-384}
      - KB_EMBEDDING_MODEL=${KB_EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INGEST_EMBED_MAX_CHARS=${INGEST_EMBED_MAX_CHARS:-6000}
      - INGEST_EMBED_MAX_TOKENS=${INGEST_EMBED_MAX_TOKENS:-2000}
      - INGEST_EMBED_SPLIT_CHARS=${INGEST_EMBED_SPLIT_CHARS:-1800}
      - INGEST_EMBED_SPLIT_OVERLAP=${INGEST_EMBED_SPLIT_OVERLAP:-200}
      - INGEST_MIN_CONFIDENCE=${INGEST_MIN_CONFIDENCE:-0.8}
      - INGEST_ALLOWED_TYPES=${INGEST_ALLOWED_TYPES:-article}
      - INGEST_UPSERT_BATCH_SIZE=${INGEST_UPSERT_BATCH_SIZE:-100}
      - INGEST_DEDUP_DB_PATH=${INGEST_DEDUP_DB_PATH:-/app/.ingest_dedup.sqlite3}
      # Inngest Configuration
      - INNGEST_BASE_URL=http://osmo-inngest:8288
      - INNGEST_EVENT_KEY=local
      # Keep ingestion worker stable (disable auto-reloader by default).
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    volumes:
      - ../inngest-py:/app
      - ../agent/Knowledge/ContectCats:/app/ContectCats
      - ../../book:/app/book
    depends_on:
      - qdrant
      - inngest
    networks:
      - osmo-network

  upload-ui:
    build:
      context: ../inngest-py
      dockerfile: Dockerfile
    container_name: osmo-upload-ui
    ports:
      - "8501:8501"
    environment:
      - INNGEST_EVENT_KEY=local
      - INNGEST_SIGNING_KEY=local
      # Point to Inngest Dev Server
      - INNGEST_BASE_URL=http://osmo-inngest:8288
    volumes:
      - ../inngest-py:/app
    command: streamlit run app.py
    depends_on:
      - inngest
    networks:
      - osmo-network

volumes:
  postgres_data:
  qdrant_data:


networks:
  osmo-network:
    driver: bridge
