version: '3.8'

services:
  backend:
    build: .
    container_name: osmo-backend
    volumes:
      - .:/app
      - ../connectors:/app/connectors
      - ../analysis:/app/analysis
      - ../analysis:/app/analysis
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SAVE_TO_DB=${SAVE_TO_DB:-False}
      - DATABASE_URL=postgresql://osmo_user:osmo_password@db:5432/osmo_db
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - osmo-network

  redis:
    image: redis:7-alpine
    container_name: osmo-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - osmo-network

  db:
    image: postgres:15-alpine
    container_name: osmo-db
    environment:
      POSTGRES_USER: osmo_user
      POSTGRES_PASSWORD: osmo_password
      POSTGRES_DB: osmo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "osmo_db", "-U", "osmo_user" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - osmo-network

  mem0:
    build:
      context: ../mem0/server
      dockerfile: Dockerfile
    container_name: osmo-mem0
    ports:
      - "8888:8000"
    env_file:
      - ../mem0/server/.env
    environment:
      - VECTOR_STORE_PROVIDER=qdrant
      - QDRANT_HOST=osmo-qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    depends_on:
      - qdrant
    networks:
      - osmo-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: osmo-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - osmo-network

volumes:
  postgres_data:
  qdrant_data:


networks:
  osmo-network:
    driver: bridge
