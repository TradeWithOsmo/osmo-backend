version: '3.8'

services:
  backend:
    build: .
    container_name: osmo-backend
    volumes:
      - .:/app
      - ../connectors:/app/connectors
      - ../analysis:/app/analysis
      - ../agent:/app/agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SAVE_TO_DB=${SAVE_TO_DB:-False}
      - DATABASE_URL=postgresql://osmo_user:osmo_password@db:5432/osmo_db
      - REDIS_URL=redis://osmo-redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - osmo-network

  redis:
    image: redis:7-alpine
    container_name: osmo-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - osmo-network

  db:
    image: postgres:15-alpine
    container_name: osmo-db
    environment:
      POSTGRES_USER: osmo_user
      POSTGRES_PASSWORD: osmo_password
      POSTGRES_DB: osmo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "osmo_db", "-U", "osmo_user" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - osmo-network

  mem0:
    build:
      context: ../mem0/server
      dockerfile: Dockerfile
    container_name: osmo-mem0
    ports:
      - "8888:8000"
    env_file:
      - ../mem0/server/.env
    environment:
      - VECTOR_STORE_PROVIDER=qdrant
      - QDRANT_HOST=osmo-qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    depends_on:
      - qdrant
    networks:
      - osmo-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: osmo-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - osmo-network

  inngest:
    image: inngest/inngest:latest
    container_name: osmo-inngest
    ports:
      - "8288:8288"
    environment:
      - INNGEST_EVENT_KEY=local
      - INNGEST_SIGNING_KEY=local
    # Start dev server pointing to our worker service automatically
    command: inngest dev -u http://osmo-inngest-worker:8000/api/inngest
    restart: unless-stopped
    networks:
      - osmo-network

  inngest-worker:
    build:
      context: ../inngest-py
      dockerfile: Dockerfile
    container_name: osmo-inngest-worker
    ports:
      - "8008:8000"
    environment:
      - QDRANT_HOST=osmo-qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Inngest Configuration
      - INNGEST_BASE_URL=http://osmo-inngest:8288
      - INNGEST_EVENT_KEY=local
      # If flask autoreload is needed:
      - FLASK_DEBUG=1
    volumes:
      - ../inngest-py:/app
      - ../agent/Knowledge/ContectCats:/app/ContectCats
      - ../../book:/app/book
    depends_on:
      - qdrant
      - inngest
    networks:
      - osmo-network

  upload-ui:
    build:
      context: ../inngest-py
      dockerfile: Dockerfile
    container_name: osmo-upload-ui
    ports:
      - "8501:8501"
    environment:
      - INNGEST_EVENT_KEY=local
      - INNGEST_SIGNING_KEY=local
      # Point to Inngest Dev Server
      - INNGEST_BASE_URL=http://osmo-inngest:8288
    volumes:
      - ../inngest-py:/app
    command: streamlit run app.py
    depends_on:
      - inngest
    networks:
      - osmo-network

volumes:
  postgres_data:
  qdrant_data:


networks:
  osmo-network:
    driver: bridge
