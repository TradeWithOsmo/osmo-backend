version: "3.8"

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osmo-agent
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - APP_NAME=Osmo Agent
      - APP_URL=https://tradewithosmo.com
      - LOG_LEVEL=INFO
      - DEFAULT_MODEL=anthropic/claude-3.5-sonnet
      - PYTHONUNBUFFERED=1
      - MEM0_API_URL=http://osmo-mem0:8000
      - QDRANT_HOST=osmo-qdrant
      - QDRANT_PORT=6333
    ports:
      - "8001:8000"
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - osmo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  osmo-network:
    external: true
